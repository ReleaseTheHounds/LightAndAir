name: Feature Request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What feature do you want added?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution

  - type: textarea
    id: context
    attributes:
      label: Additional Context
